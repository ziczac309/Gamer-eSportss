<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tournament Details</title>

<style>

body{
background:#111;
color:#fff;
font-family:Arial;
padding:20px;
}

.card{
background:#1d1d1d;
padding:20px;
border-radius:15px;
}

h1{
color:#ffd700;
}

button{
width:100%;
padding:15px;
background:#ffd700;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>

<div class="card">

<h1 id="title"></h1>

<p id="entry"></p>

<p id="prize"></p>

<p id="time"></p>

<p id="slots"></p>

<button id="joinBtn">
JOIN TOURNAMENT
</button>

</div>

<script>

const tournament = JSON.parse(localStorage.getItem("selectedTournament"));

if(tournament){

document.getElementById("title").innerText = tournament.title;
document.getElementById("entry").innerText = "Entry: ₹" + tournament.entry;
document.getElementById("prize").innerText = "Prize: ₹" + tournament.prize;
document.getElementById("time").innerText = "Time: " + tournament.time;
document.getElementById("slots").innerText = "Slots: " + tournament.slots;

}else{

document.body.innerHTML="<h2 style='color:red'>Tournament Not Found</h2>";

}

document.getElementById("joinBtn").onclick=function(){

alert("Tournament Joined Successfully!");

}

</script>

</body>
</html>
